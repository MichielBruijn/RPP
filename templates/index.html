<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPP Resin Print Portal</title>
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<header class="header">
  <span class="header-title">Resin Print Portal</span>
</header>

<main class="main">

  <section class="card status-card">
    <h2 class="card-title">Printer</h2>
    <div class="printer-meta">
      <span id="online-status" class="online-status offline">OFFLINE</span>
      <div class="ip-row">
        <input type="text" id="printer-ip" readonly placeholder="IP or hostname">
        <button onclick="editIP()" class="btn btn-edit">Edit</button>
        <button onclick="saveIP()" class="btn btn-save">Save</button>
      </div>
    </div>
    <div id="status" class="status-text">Loading...</div>
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
      <span class="progress-text" id="progress-text">0%</span>
    </div>
    <div class="action-buttons" id="print-controls" style="display:none;">
      <button class="btn btn-pause" id="btn-pause" onclick="pausePrint()">&#9646;&#9646; Pause</button>
      <button class="btn btn-resume" id="btn-resume" onclick="resumePrint()" style="display:none;">&#9654; Resume</button>
      <button class="btn btn-stop" onclick="stopPrint()">&#9632; Stop</button>
    </div>
  </section>

  <section class="card files-card">
    <h2 class="card-title">Files</h2>
    <div class="table-wrapper">
      <table class="file-list" id="file-list">
        <thead>
          <tr>
            <th>Name</th>
            <th>Size</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="action-buttons">
      <button class="btn btn-upload" onclick="uploadFile()">&#8679; Upload</button>
      <button class="btn btn-print" onclick="printSelectedFile()">&#9654; Print</button>
      <button class="btn btn-delete" onclick="deleteSelectedFile()">&#10005; Delete</button>
    </div>
  </section>

</main>

<footer class="footer">
  <p>Based on <a href="https://github.com/jjtronics/RPP" target="_blank">RPP</a> by JJtronics &mdash; uses <a href="https://github.com/vvuk/cassini" target="_blank">Cassini</a> by Vladimir Vukicevic</p>
  <p>Fork: <a href="https://github.com/MichielBruijn/RPP" target="_blank">github.com/MichielBruijn/RPP</a></p>
</footer>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
